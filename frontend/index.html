<!DOCTYPE html>
<html>
<head>
  <title>Basic Snake HTML Game</title>
  <meta charset="UTF-8">
  <style>
  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    border: 1px solid white;
  }
  </style>
</head>
<body>
<canvas width="400" height="400" id="game"></canvas>
<script>
var canvas = document.getElementById('game');
var context = canvas.getContext('2d');

// the canvas width & height, snake x & y, and the apple x & y, all need to be a multiples of the grid size in order for collision detection to work
// (e.g. 16 * 25 = 400)
var grid = 16;
var count = 0;

var snake = {
  x: 160,
  y: 160,

  // snake velocity. moves one grid length every frame in either the x or y direction
  dx: 0,
  dy: 0,

  // keep track of all grids the snake body occupies
  cells: [],

  // length of the snake. grows when eating an apple
  maxCells: 4
};
var apple = {
  x: 320,
  y: 320
};
var state = null;

// get random whole numbers in a specific range
// @see https://stackoverflow.com/a/1527820/2124254
function getRandomInt(min, max) {
  return Math.floor(Math.random() * (max - min)) + min;
}

// game loop
function loop() {
  requestAnimationFrame(loop);

  // slow game loop to 15 fps instead of 60 (60/15 = 4)
  if (++count < 4) {
    return;
  }

  if (state == null) {
    return;
  }
  console.log(state);

  if (state.type == "gameover") {
    context.fillStyle = 'red';
    context.fillRect(0, 0, canvas.width, canvas.height);
    return;
  }

  count = 0;
  context.clearRect(0,0,canvas.width,canvas.height);

  
  // move snake by it's velocity
//   snake.x += snake.dx;
//   snake.y += snake.dy;

//   // wrap snake position horizontally on edge of screen
//   if (snake.x < 0) {
//     snake.x = canvas.width - grid;
//   }
//   else if (snake.x >= canvas.width) {
//     snake.x = 0;
//   }

//   // wrap snake position vertically on edge of screen
//   if (snake.y < 0) {
//     snake.y = canvas.height - grid;
//   }
//   else if (snake.y >= canvas.height) {
//     snake.y = 0;
//   }

  // keep track of where snake has been. front of the array is always the head
//   snake.cells.unshift({x: snake.x, y: snake.y});

//   // remove cells as we move away from them
//   if (snake.cells.length > snake.maxCells) {
//     snake.cells.pop();
//   }

  // draw apple
  if (state.food) {
    context.fillStyle = 'red';
    context.fillRect(state.food[0], state.food[1], grid-1, grid-1);
  }


  // draw snake one cell at a time
  context.fillStyle = 'green';
  state.players.forEach(function(player) {
    console.log("PLAYER", player);
    player.snake.forEach(function(cell) {
        console.log("CELL", cell);
        context.fillRect(cell[0], cell[1], grid - 1, grid - 1);
    });
  })

//   state.player.snake[0].forEach(function(cell, index) {

    // drawing 1 px smaller than the grid creates a grid effect in the snake body so you can see how long it is
    // context.fillRect(cell.x, cell.y, grid-1, grid-1);

    // snake ate apple
    // if (cell.x === apple.x && cell.y === apple.y) {
    //   snake.maxCells++;

    //   // canvas is 400x400 which is 25x25 grids
    //   apple.x = getRandomInt(0, 25) * grid;
    //   apple.y = getRandomInt(0, 25) * grid;
    // }

    // check collision with all cells after this one (modified bubble sort)
    // for (var i = index + 1; i < snake.cells.length; i++) {

    //   // snake occupies same space as a body part. reset game
    //   if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
    //     snake.x = 160;
    //     snake.y = 160;
    //     snake.cells = [];
    //     snake.maxCells = 4;
    //     snake.dx = grid;
    //     snake.dy = 0;

    //     apple.x = getRandomInt(0, 25) * grid;
    //     apple.y = getRandomInt(0, 25) * grid;
    //   }
    // }

    state = null;
    snake.dx = 0;
    snake.dy = 0;
//   });
}

// listen to keyboard events to move the snake
document.addEventListener('keydown', function(e) {
  // prevent snake from backtracking on itself by checking that it's
  // not already moving on the same axis (pressing left while moving
  // left won't do anything, and pressing right while moving left
  // shouldn't let you collide with your own body)

  // left arrow key
  if (e.which === 37) {
    state = sendMove("LEFT", 0);
  }
  // up arrow key
  else if (e.which === 38) {
    state =  sendMove("UP", 0);
  }
  // right arrow key
  else if (e.which === 39) {
    state =  sendMove("RIGHT", 0);
  }
  // down arrow key
  else if (e.which === 40) {
    state =  sendMove("DOWN", 0);
  }
  else if (e.which === 65) {
    state = sendMove("LEFT", 1);
  }
  else if (e.which === 87) {
    state =  sendMove("UP", 1);
  }
  else if (e.which === 68) {
    state =  sendMove("RIGHT", 1);
  }
  else if (e.which === 83) {
    state =  sendMove("DOWN", 1);
  }
});
function sendMove(move, player) {
  var xhr = new XMLHttpRequest();
  xhr.open("POST", "http://192.168.1.106:8888/move", false);
  xhr.setRequestHeader("Content-Type", "application/json;charset=UTF-8");

  try {
    xhr.send(JSON.stringify({
        type: "move",
        player: player,
        direction: move,
    }));

    if (xhr.status >= 200 && xhr.status < 300) {
      console.log(JSON.parse(xhr.responseText));
      return JSON.parse(xhr.responseText); // or JSON.parse(xhr.responseText)
    } else {
      console.error("Request failed with status:", xhr.status);
      return null;
    }
  } catch (e) {
    console.error("Request error:", e);
    return null;
  }

//     fetch("http://192.168.1.106:8888/move", {
//   method: "POST",

//     type: "move",
//     direction: move,
//   })
// })
//   .then((response) => response.json())
//   .then((json) => console.log(json));
}

// start the game
requestAnimationFrame(loop);
</script>
</body>
</html>
